name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, archive: tar.gz }
          - { os: macos-latest, target: aarch64-apple-darwin, archive: tar.gz }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, archive: zip }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package (unix)
        if: matrix.archive != 'zip'
        run: |
          staging="slop-lens-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp target/${{ matrix.target }}/release/slop-lens "$staging/"
          cp README.md LICENSE "$staging/"
          tar czf "$staging.tar.gz" -C "$staging" .
      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          staging="slop-lens-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp target/${{ matrix.target }}/release/slop-lens.exe "$staging/"
          cp README.md LICENSE "$staging/"
          7z a "$staging.zip" "$staging"
      - uses: actions/upload-artifact@v4
        with:
          name: slop-lens-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate demo GIF
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          cargo build --release
          ./target/release/slop-lens demo --out hero.gif
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            hero.gif
          generate_release_notes: true
